<div class="login-container">
  <div class="login-card">
    <h2>Bem-vindo</h2>
    <p>Faça login para gerir os seus produtos</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="login">E-mail ou Username</label>
        <input type="text" id="login" formControlName="login" placeholder="ex: admin@email.com" />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" formControlName="password" placeholder="******" />

        <div class="validation-error"
          *ngIf="loginForm.get('password')?.errors?.['minlength'] && loginForm.get('password')?.touched">
          A senha deve ter pelo menos 6 caracteres.
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Entrando...' : 'Entrar' }}
      </button>

      <div class="register-link">
        <p>Ainda não tem conta? <a routerLink="/register">Registe-se aqui</a></p>
      </div>
    </form>
  </div>
</div>
