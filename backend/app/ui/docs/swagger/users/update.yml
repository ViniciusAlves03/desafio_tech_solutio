tags:
  - Users
summary: Updates user data
description: You can send only the fields you want to change. A user can only update themselves.
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    schema:
      type: integer
    required: true
    description: User ID
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          username:
            type: string
            example: johndoe_new
          password:
            type: string
            example: new_password_123
responses:
  200:
    description: User updated successfully.
  403:
    description: Access denied (tried to change another user).
