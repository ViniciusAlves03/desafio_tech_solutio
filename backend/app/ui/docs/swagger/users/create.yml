tags:
  - Users
summary: Creates a new user (Registration)
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required: [username, email, password]
        properties:
          username:
            type: string
            example: johndoe
          email:
            type: string
            example: john@email.com
          password:
            type: string
            example: secure_password123
responses:
  201:
    description: User created successfully.
  400:
    description: Data validation error.
  409:
    description: Conflict (Email or username already in use).
