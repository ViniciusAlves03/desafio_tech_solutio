tags:
  - Authentication
summary: Authenticates the user and returns the JWT Token
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          login:
            type: string
            example: admin@email.com
          password:
            type: string
            example: secure_password123
responses:
  200:
    description: Success. Returns the access token.
  400:
    description: Invalid input data.
  401:
    description: Incorrect credentials or unauthorized.
