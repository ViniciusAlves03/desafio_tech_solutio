tags:
  - Products
summary: Lists all products with pagination and filters
security:
  - bearerAuth: []
parameters:
  - in: query
    name: page
    schema:
      type: integer
      default: 1
    description: Page number
  - in: query
    name: per_page
    schema:
      type: integer
      default: 10
    description: Number of items per page
  - in: query
    name: name
    schema:
      type: string
    description: Filter by part of the name
  - in: query
    name: brand
    schema:
      type: string
    description: Filter by brand
  - name: sort_by
    in: query
    type: string
    description: "Coluna para ordenação (id ou name)"
    default: "id"
  - name: sort_order
    in: query
    type: string
    description: "Ordem da listagem (asc ou desc)"
    default: "asc"
responses:
  200:
    description: Paginated list of products returned successfully.
