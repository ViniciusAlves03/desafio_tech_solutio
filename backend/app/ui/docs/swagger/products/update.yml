tags:
  - Products
summary: Enqueues the update of a product
description: You can alter text fields or send a new image.
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    schema:
      type: integer
    required: true
requestBody:
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          price:
            type: number
            example: 199.90
          image:
            type: string
            format: binary
responses:
  202:
    description: Update enqueued successfully.
  403:
    description: Access denied (product belongs to another user).
