tags:
  - Products
summary: Enqueues the creation of a new product with an image
description: Asynchronous operation. Data is sent to the Redis queue and processed by the Worker.
security:
  - bearerAuth: []
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        required: [name, price, brand, quantity]
        properties:
          name:
            type: string
            example: Mechanical Keyboard
          price:
            type: number
            example: 250.50
          brand:
            type: string
            example: Razer
          quantity:
            type: integer
            example: 15
          image:
            type: string
            format: binary
            description: JPG/PNG File (Optional)
responses:
  202:
    description: Product enqueued for creation.
  400:
    description: Validation error.
  401:
    description: Unauthorized.
