tags:
  - Products
summary: Returns the product image
description: Returns the binary image stored in the database. This route is private and requires authentication.
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    schema:
      type: integer
    required: true
    description: Product ID
responses:
  200:
    description: Image file returned successfully.
  401:
    description: Unauthorized access (Missing or invalid JWT token).
  404:
    description: Product not found or has no image.
